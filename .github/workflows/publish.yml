name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4.1

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Debug workspace
        run: |
          echo "github.workspace = ${{ github.workspace }}"
          echo "Current directory: $(pwd)"
          echo "Contents of workspace:"
          ls -la "${{ github.workspace }}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest pytest-cov
          python -m pip install -e "${{ github.workspace }}"

      - name: Verify package installation
        run: python -c "import ownjoo_utils; print('✓ ownjoo_utils installed'); import sys; print('Python path:', sys.path)"

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest "${{ github.workspace }}/test"

      - name: Build distribution
        run: cd "${{ github.workspace }}" && python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          directory: ${{ github.workspace }}/dist
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          directory: ${{ github.workspace }}/dist
          password: ${{ secrets.PYPI_API_TOKEN }}